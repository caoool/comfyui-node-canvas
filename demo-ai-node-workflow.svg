<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">AI node creation workflow demo</title>
  <desc id="desc">A looping demo showing a user asking for a ComfyUI node, AI creating it, deployment to ComfyUI, and final testing.</desc>
  <defs>
    <clipPath id="screenClip">
      <rect x="24" y="24" width="1392" height="852" rx="26" />
    </clipPath>
    <linearGradient id="bottomShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07090f" stop-opacity="0" />
      <stop offset="0.44" stop-color="#07090f" stop-opacity="0.68" />
      <stop offset="1" stop-color="#07090f" stop-opacity="0.96" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827" stop-opacity="0.96" />
      <stop offset="1" stop-color="#07090f" stop-opacity="0.96" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07c160" />
      <stop offset="0.45" stop-color="#28d4a0" />
      <stop offset="1" stop-color="#5b6cff" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.55" />
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#07090f" />
  <rect x="18" y="18" width="1404" height="864" rx="31" fill="#0d1018" stroke="#ffffff" stroke-opacity="0.11" />
  <g clip-path="url(#screenClip)">
    <image href="ai-builder.png" x="0" y="0" width="1440" height="1024" preserveAspectRatio="xMidYMin slice" />
    <rect x="0" y="0" width="1440" height="900" fill="url(#bottomShade)" />
    <rect x="0" y="0" width="1440" height="900" fill="#07090f" opacity="0.08" />
  </g>

  <g filter="url(#softShadow)">
    <rect x="72" y="598" width="1296" height="204" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.14" />
    <rect x="72" y="598" width="1296" height="204" rx="24" fill="#ffffff" opacity="0.018" />
    <rect x="104" y="630" width="1232" height="8" rx="4" fill="#ffffff" opacity="0.08" />
    <rect x="104" y="630" width="1232" height="8" rx="4" fill="url(#accent)">
      <animate attributeName="width" values="0;1232;1232" keyTimes="0;0.92;1" dur="12s" repeatCount="indefinite" />
    </rect>
  </g>

  <g font-family="Inter, Noto Sans SC, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="104" y="682" fill="#e7e9ee" font-size="34" font-weight="800">Prompt to ComfyUI node, handled by AI</text>
    <text x="104" y="720" fill="#aab0bc" font-size="18" font-weight="520">User asks for a simple LLM prompt enhancer. AI creates the node, updates files, deploys, then the node is tested in ComfyUI.</text>

    <g opacity="1">
      <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;0.18;0.24;0.25;0.9;0.98;1" dur="12s" repeatCount="indefinite" />
      <circle cx="118" cy="766" r="8" fill="#07c160" filter="url(#glow)" />
      <text x="138" y="773" fill="#e7e9ee" font-size="18" font-weight="760">1. User enters the node idea</text>
      <text x="398" y="773" fill="#aab0bc" font-size="16">"Take a simple string prompt and use the smallest LLM to output an image prompt."</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.23;0.29;0.43;0.49;1" dur="12s" repeatCount="indefinite" />
      <circle cx="118" cy="766" r="8" fill="#28d4a0" filter="url(#glow)" />
      <text x="138" y="773" fill="#e7e9ee" font-size="18" font-weight="760">2. AI builds the custom node</text>
      <text x="398" y="773" fill="#aab0bc" font-size="16">Creates the node contract, generated Python, and requirements.</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.48;0.54;0.68;0.74;1" dur="12s" repeatCount="indefinite" />
      <circle cx="118" cy="766" r="8" fill="#5b6cff" filter="url(#glow)" />
      <text x="138" y="773" fill="#e7e9ee" font-size="18" font-weight="760">3. Deploys into ComfyUI</text>
      <text x="398" y="773" fill="#aab0bc" font-size="16">Writes the pack, installs dependencies when needed, and restarts after approval.</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.73;0.79;0.93;1" dur="12s" repeatCount="indefinite" />
      <circle cx="118" cy="766" r="8" fill="#ffb454" filter="url(#glow)" />
      <text x="138" y="773" fill="#e7e9ee" font-size="18" font-weight="760">4. Tested in ComfyUI</text>
      <text x="398" y="773" fill="#aab0bc" font-size="16">The generated prompt node is ready to use in an image workflow.</text>
    </g>
  </g>
</svg>
