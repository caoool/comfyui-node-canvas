<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="246" viewBox="0 0 1000 246" role="img" aria-labelledby="title desc">
  <title id="title">Prompt to ComfyUI node, handled by AI</title>
  <desc id="desc">An animated progress panel with four synced steps: user enters a node idea, AI builds the node, deploys into ComfyUI, and tests it in a workflow.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#07090f"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07c160"/>
      <stop offset="0.52" stop-color="#28d4a0"/>
      <stop offset="1" stop-color="#5b6cff"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <filter id="green-glow" x="-160%" y="-160%" width="420%" height="420%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { fill: #f8fafc; font: 800 27px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .sub { fill: #9ca3af; font: 560 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .step-title { fill: #f8fafc; font: 780 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .step-copy { fill: #a7b0c1; font: 560 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .badge { fill: #d1d5db; font: 760 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .4px; }
    </style>
  </defs>

  <rect width="1000" height="246" rx="20" fill="#020617"/>
  <rect x="14" y="14" width="972" height="218" rx="18" fill="url(#panel)" stroke="#293244" filter="url(#shadow)"/>

  <rect x="48" y="45" width="904" height="8" rx="4" fill="#263142"/>
  <rect x="48" y="45" width="0" height="8" rx="4" fill="url(#bar)">
    <animate attributeName="width" from="0" to="904" dur="41.6s" repeatCount="indefinite"/>
  </rect>

  <text x="48" y="92" class="label">Prompt to ComfyUI node, handled by AI</text>
  <text x="48" y="121" class="sub">从提示到 ComfyUI 节点，AI 完成重活</text>

  <g opacity="1">
    <animate attributeName="opacity" dur="41.6s" repeatCount="indefinite" keyTimes="0;0.24;0.30;1" values="1;1;0;0"/>
    <circle cx="66" cy="170" r="10" fill="#07c160" filter="url(#green-glow)"/>
    <text x="92" y="166" class="step-title">1. User enters the node idea</text>
    <text x="92" y="196" class="step-copy">Simple string prompt to image-generation prompt. / 把简单字符串提示词增强成图像生成提示词。</text>
    <text x="860" y="92" class="badge">IDEA</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" dur="41.6s" repeatCount="indefinite" keyTimes="0;0.24;0.25;0.49;0.55;1" values="0;0;1;1;0;0"/>
    <circle cx="66" cy="170" r="10" fill="#28d4a0" filter="url(#green-glow)"/>
    <text x="92" y="166" class="step-title">2. AI builds the node</text>
    <text x="92" y="196" class="step-copy">Contract, Python, requirements, and generated files. / 节点接口、Python、依赖和生成文件。</text>
    <text x="837" y="92" class="badge">BUILD</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" dur="41.6s" repeatCount="indefinite" keyTimes="0;0.49;0.50;0.74;0.80;1" values="0;0;1;1;0;0"/>
    <circle cx="66" cy="170" r="10" fill="#5b6cff" filter="url(#green-glow)"/>
    <text x="92" y="166" class="step-title">3. Deploys into ComfyUI</text>
    <text x="92" y="196" class="step-copy">Writes the pack after deploy approval. / 在允许部署后写入节点包。</text>
    <text x="809" y="92" class="badge">DEPLOY</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" dur="41.6s" repeatCount="indefinite" keyTimes="0;0.74;0.75;0.97;1" values="0;0;1;1;0"/>
    <circle cx="66" cy="170" r="10" fill="#ffb454" filter="url(#green-glow)"/>
    <text x="92" y="166" class="step-title">4. Tested in ComfyUI</text>
    <text x="92" y="196" class="step-copy">The generated node is ready in a workflow. / 生成的节点可直接放入工作流。</text>
    <text x="844" y="92" class="badge">TEST</text>
  </g>
</svg>
