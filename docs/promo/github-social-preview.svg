    <rect x="28" y="34" width="152" height="10" rx="5" fill="url(#grad)"/>
    <circle cx="48" cy="91" r="9" fill="#07c160"/>
    <text x="68" y="99" class="sans" fill="#f8fafc" font-size="22" font-weight="800">Prompt</text>
    <circle cx="48" cy="141" r="9" fill="#28d4a0"/>
    <text x="68" y="149" class="sans" fill="#f8fafc" font-size="22" font-weight="800">AI builds</text>
    <circle cx="48" cy="191" r="9" fill="#5b6cff"/>
