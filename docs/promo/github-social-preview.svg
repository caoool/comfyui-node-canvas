<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">ComfyUI Node Builder</title>
  <desc id="desc">Social preview image for ComfyUI Node Builder, an AI-powered GUI app for custom ComfyUI nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110d"/>
      <stop offset="0.55" stop-color="#07090f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07c160"/>
      <stop offset="0.5" stop-color="#28d4a0"/>
      <stop offset="1" stop-color="#5b6cff"/>
    </linearGradient>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, ui-monospace, monospace; }
      .sans { font-family: Inter, "Noto Sans SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="64" y="64" width="1152" height="512" rx="28" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.14)"/>
  <rect x="96" y="96" width="88" height="88" rx="22" fill="#05070c" stroke="rgba(255,255,255,0.12)"/>
  <path d="M140 112 172 144 140 176 108 144Z" fill="none" stroke="#07c160" stroke-width="7"/>
  <circle cx="140" cy="144" r="10" fill="#5b6cff"/>
  <text x="212" y="150" class="mono" fill="#e7e9ee" font-size="34" font-weight="800">ComfyUI Node Builder</text>
  <text x="96" y="288" class="sans" fill="#f8fafc" font-size="74" font-weight="850">Build ComfyUI custom</text>
  <text x="96" y="372" class="sans" fill="#f8fafc" font-size="74" font-weight="850">nodes with GUI and AI.</text>
  <text x="96" y="442" class="sans" fill="#aab0bc" font-size="30" font-weight="560">Visual node contracts · Editable Python · AI Builder · Deploy and test</text>
  <rect x="96" y="494" width="372" height="48" rx="24" fill="url(#grad)"/>
